server:
  port: 8084

spring:
  application:
    name: money-transfer-service

  datasource:
    url: jdbc:postgresql://postgres:5432/money_transfer_service
    username: username
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
    consumer:
      group-id: money-transfer-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: true
        spring.json.type.mapping: >
          AccountDebitedIntegrationEvent:common.event.AccountDebitedIntegrationEvent,
          AccountCreditedIntegrationEvent:common.event.AccountCreditedIntegrationEvent,
          AccountDebitFailedIntegrationEvent:common.event.AccountDebitFailedIntegrationEvent,
          AccountCreditFailedIntegrationEvent:common.event.AccountCreditFailedIntegrationEvent

eureka:
  client:
    service-url:
      defaultZone: http://discovery:8761/eureka/
  instance:
    prefer-ip-address: true


resilience4j:
  circuitbreaker:
    instances:
      fraudService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

  retry:
    instances:
      fraudService:
        max-attempts: 3
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        wait-duration: 1s
        retry-exceptions:
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - java.io.IOException