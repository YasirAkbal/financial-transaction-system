server:
  port: 8084

spring:
  application:
    name: money-transfer-service

  datasource:
    url: jdbc:postgresql://postgres:5432/money_transfer_service
    username: username
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
    consumer:
      group-id: money-transfer-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: true
        spring.json.type.mapping: >
          AccountDebitedIntegrationEvent:common.event.AccountDebitedIntegrationEvent,
          AccountCreditedIntegrationEvent:common.event.AccountCreditedIntegrationEvent,
          AccountDebitFailedIntegrationEvent:common.event.AccountDebitFailedIntegrationEvent,
          AccountCreditFailedIntegrationEvent:common.event.AccountCreditFailedIntegrationEvent
    listener:
      delivery-attempt-threshold: 1

eureka:
  client:
    service-url:
      defaultZone: http://discovery:8761/eureka/
  instance:
    prefer-ip-address: true